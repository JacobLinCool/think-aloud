# Rolling "dev" channel: a signed + notarized build of the latest main, published to a fixed
# PRERELEASE release tagged `dev` with a stable asset URL + its own appcast (`appcast-dev.xml`).
#
# Users opt in via Settings → Updates → Channel = Dev, which points Sparkle's feed at
# `releases/download/dev/appcast-dev.xml`. Because the `dev` release is a prerelease, the stable
# feed (`releases/latest/download/appcast.xml`) is unaffected — `latest` ignores prereleases.
#
# Versioning: CFBundleVersion = commit count (same scheme as release.yml), so dev builds (HEAD)
# are always numerically ahead of the stable tag they branch from. Uses the SAME signing cert and
# EdDSA key as the stable channel (Sparkle requires identical signing identities across updates).
# Required secrets: identical set to release.yml.

name: Dev Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'site/**'
      - 'images/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true   # a newer push supersedes an in-flight dev build

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          LATEST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo v0.0.0)"
          BASE="${LATEST_TAG#v}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD="$(git rev-list --count HEAD)"
          VERSION="${BASE}-dev"
          echo "version=$VERSION"      >> "$GITHUB_OUTPUT"
          echo "short_version=${VERSION} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"          >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA"        >> "$GITHUB_OUTPUT"
          echo "Building dev (MARKETING_VERSION=$VERSION, CFBundleVersion=$BUILD, sha=$SHORT_SHA)"

      - name: Guard against version regression
        # See release.yml: commit count must not go backwards or Sparkle stops offering dev updates.
        run: |
          set -euo pipefail
          BUILD="${{ steps.version.outputs.build }}"
          PREV=$(curl -sL "https://github.com/${GITHUB_REPOSITORY}/releases/download/dev/appcast-dev.xml" 2>/dev/null \
            | grep -oE '<sparkle:version>[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [[ -n "${PREV:-}" && "$BUILD" -lt "$PREV" ]]; then
            echo "::error::dev CFBundleVersion regression: new build $BUILD < last published $PREV (history rewritten?)."
            exit 1
          fi
          echo "Build $BUILD >= last published dev ${PREV:-none} — OK"

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install build deps
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          P12_BASE64:    ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          P12_PASSWORD:  ${{ secrets.DEVELOPER_ID_CERT_P12_PASSWORD }}
          KEYCHAIN_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain  -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          security find-identity -v -p codesigning "$KEYCHAIN"
          echo "BUILD_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Archive
        env:
          MARKETING_VERSION:       ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ steps.version.outputs.build }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project ThinkAloud.xcodeproj \
            -scheme ThinkAloud \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ThinkAloud.xcarchive" \
            -destination 'generic/platform=macOS' \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=5H75SGA7KP \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export .app
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ThinkAloud.xcarchive" \
            -exportOptionsPlist scripts/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Verify .app signature + hardened runtime
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/export/ThinkAloud.app"
          codesign --verify --strict --deep --verbose=2 "$APP"
          codesign --display --verbose=2 "$APP" 2>&1 | grep -q 'runtime' \
            || { echo "::error::Hardened runtime missing from signed .app"; exit 1; }

      - name: Build DMG
        id: dmg
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/export/ThinkAloud.app"
          DMG_NAME="ThinkAloud-dev.dmg"   # fixed name → stable enclosure URL on the `dev` release
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "ThinkAloud" -srcfolder "$STAGING" -ov -format UDZO "$DMG_PATH"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" --timestamp "${{ steps.dmg.outputs.path }}"
          codesign --verify --verbose=2 "${{ steps.dmg.outputs.path }}"

      - name: Notarize DMG
        env:
          ASC_API_KEY_ID:     ${{ secrets.NOTARY_API_KEY_ID }}
          ASC_API_ISSUER_ID:  ${{ secrets.NOTARY_API_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          SUBMIT_JSON=$(xcrun notarytool submit "${{ steps.dmg.outputs.path }}" \
            --key "$KEY_PATH" --key-id "$ASC_API_KEY_ID" --issuer "$ASC_API_ISSUER_ID" \
            --wait --output-format json)
          echo "$SUBMIT_JSON"
          SUBMISSION_ID=$(printf '%s' "$SUBMIT_JSON" | jq -r '.id')
          STATUS=$(printf '%s' "$SUBMIT_JSON" | jq -r '.status')
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "::error::Notarization status: $STATUS — dumping log."
            xcrun notarytool log "$SUBMISSION_ID" --key "$KEY_PATH" --key-id "$ASC_API_KEY_ID" --issuer "$ASC_API_ISSUER_ID"
            rm -f "$KEY_PATH"; exit 1
          fi
          rm -f "$KEY_PATH"

      - name: Staple + Gatekeeper assess
        run: |
          set -euo pipefail
          xcrun stapler staple "${{ steps.dmg.outputs.path }}"
          xcrun stapler validate "${{ steps.dmg.outputs.path }}"
          spctl --assess --type open --context context:primary-signature -v "${{ steps.dmg.outputs.path }}"

      - name: Generate Sparkle appcast (dev)
        id: appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "::warning::SPARKLE_ED_PRIVATE_KEY not set — skipping appcast. Dev auto-update won't be served."
            exit 0
          fi
          BUILD="${{ steps.version.outputs.build }}"
          SHORT_VERSION="${{ steps.version.outputs.short_version }}"
          DMG="${{ steps.dmg.outputs.path }}"
          DMG_NAME="${{ steps.dmg.outputs.name }}"

          SPARKLE_TOOLS_VERSION="2.9.2"
          curl -sL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

          SIG_ATTRS=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" \
            | "$RUNNER_TEMP/sparkle/bin/sign_update" "$DMG" --ed-key-file -)

          ENCLOSURE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/dev/${DMG_NAME}"
          PUB_DATE="$(date '+%a, %d %b %Y %H:%M:%S %z')"
          APPCAST="$RUNNER_TEMP/appcast-dev.xml"
          cat > "$APPCAST" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>ThinkAloud (dev)</title>
              <link>https://github.com/${GITHUB_REPOSITORY}</link>
              <description>ThinkAloud dev-channel automatic updates (latest main)</description>
              <language>en</language>
              <item>
                <title>ThinkAloud ${SHORT_VERSION}</title>
                <sparkle:version>${BUILD}</sparkle:version>
                <sparkle:shortVersionString>${SHORT_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <description><![CDATA[<p>Rolling build of the latest <code>main</code>. See <a href="https://github.com/${GITHUB_REPOSITORY}/commits/main">recent commits</a>.</p>]]></description>
                <enclosure url="${ENCLOSURE_URL}" ${SIG_ATTRS} type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "path=$APPCAST" >> "$GITHUB_OUTPUT"
          cat "$APPCAST"

      - name: Publish dev prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.path }}"
          APPCAST="${{ steps.appcast.outputs.path }}"
          SHA="${{ steps.version.outputs.sha }}"
          NOTES="Rolling build of the latest \`main\` (\`${SHA}\`, build ${{ steps.version.outputs.build }}). Opt in via Settings → Updates → Channel = Dev. Less stable than the official channel."

          # Order matters: upload the DMG FIRST, the appcast LAST. Sparkle reads the appcast then
          # downloads the enclosure, so the new-signature appcast must only go live once the matching
          # DMG is fully uploaded — otherwise a check landing in the gap hits a signature/byte mismatch.
          if gh release view dev >/dev/null 2>&1; then
            gh release upload dev "$DMG" --clobber
            gh release edit dev --prerelease --notes "$NOTES"
          else
            gh release create dev "$DMG" --prerelease --target main --title "ThinkAloud (dev)" --notes "$NOTES"
          fi
          if [[ -n "$APPCAST" && -f "$APPCAST" ]]; then
            gh release upload dev "$APPCAST" --clobber
          fi

          # Insurance: the dev release MUST stay a prerelease, or it could win `releases/latest`
          # and start serving dev builds to stable users.
          IS_PRE=$(gh release view dev --json isPrerelease -q .isPrerelease)
          if [[ "$IS_PRE" != "true" ]]; then
            echo "::error::dev release is not marked prerelease — it could pollute the stable 'latest' feed."
            exit 1
          fi

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$BUILD_KEYCHAIN" || true
